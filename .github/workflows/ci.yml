name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs reports

      - name: Create minimal .env for tests
        run: |
          echo "API_KEY=test-ci-key" > .env
          echo "SIMULATION_MODE=true" >> .env
          echo "USE_AI_REASONING=false" >> .env
          echo "USE_FOUNDRY=false" >> .env

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
