version: "3.9"

services:
  # -------------------------------------------------------
  # Flask REST API
  # -------------------------------------------------------
  api:
    build: .
    container_name: ai-devops-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -------------------------------------------------------
  # Streamlit Dashboard
  # -------------------------------------------------------
  dashboard:
    build: .
    container_name: ai-devops-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: ["streamlit", "run", "ui/dashboard.py",
              "--server.port=8501",
              "--server.address=0.0.0.0",
              "--server.headless=true"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  logs:
  reports:
